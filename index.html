<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כאן 88</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222;
      --accent: #c8a97e; --text: #e8e0d4; --muted: #666; --red: #c0392b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Frank Ruhl Libre', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .container { width: 100%; max-width: 480px; }
    .header { text-align: center; margin-bottom: 3rem; }
    .station-name { font-size: 5rem; font-weight: 300; letter-spacing: -2px; line-height: 1; }
    .station-name span { color: var(--accent); }
    .tagline { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 0.5rem; }
    .player-card { background: var(--surface); border: 1px solid var(--border); padding: 2rem; margin-bottom: 1rem; }
    .now-playing { margin-bottom: 2rem; min-height: 80px; }
    .now-playing-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .live-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: pulse 1.5s infinite; opacity: 0.3; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .song-title { font-size: 1.6rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.25rem; transition: all 0.4s ease; }
    .song-artist { font-size: 0.95rem; color: var(--accent); font-weight: 300; }
    .song-waiting { font-size: 1rem; color: var(--muted); font-style: italic; }
    .song-live { font-size: 2rem; font-weight: 300; letter-spacing: 6px; color: var(--accent); }
    .song-links { margin-top: 0.75rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .song-links a { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--accent); text-decoration: none; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    .song-links a:hover { border-color: var(--accent); }
    .controls { display: flex; align-items: center; gap: 1rem; }
    .play-btn { width: 56px; height: 56px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; flex-shrink: 0; }
    .play-btn:hover { background: var(--accent); color: var(--bg); }
    .play-btn svg { width: 20px; height: 20px; }
    .volume-wrap { flex: 1; display: flex; align-items: center; gap: 0.75rem; }
    .volume-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; }
    input[type=range] { flex: 1; -webkit-appearance: none; height: 1px; background: var(--border); outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); cursor: pointer; }
    .btn { width: 100%; padding: 1rem; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; margin-bottom: 0.5rem; }
    .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.active { border-color: var(--accent); color: var(--accent); }
    .btn.detecting { border-color: var(--accent); color: var(--accent); animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .history { border: 1px solid var(--border); margin-top: 0.5rem; }
    .history-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
    .history-list { max-height: 200px; overflow-y: auto; }
    .history-item { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.4s ease; }
    .history-item:last-child { border-bottom: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .history-song { font-size: 0.9rem; }
    .history-artist { font-size: 0.75rem; color: var(--accent); }
    .history-time { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); }
    .empty-history { padding: 1.5rem 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; font-style: italic; }
    .history-item input[type=checkbox] { appearance: none; width: 14px; height: 14px; border: 1px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
    .history-item input[type=checkbox]:checked { background: var(--accent); border-color: var(--accent); }
    .select-all-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .select-all-wrap input[type=checkbox] { appearance: none; width: 14px; height: 14px; border: 1px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
    .select-all-wrap input[type=checkbox]:checked { background: var(--accent); border-color: var(--accent); }
    .status-bar { margin-top: 1rem; font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; text-align: center; min-height: 1rem; }
    .status-bar.error { color: var(--red); }
    .status-bar.success { color: #27ae60; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="station-name">כאן <span>88</span></div>
      <div class="tagline">רדיו המוזיקה של ישראל</div>
    </div>
    <div class="player-card">
      <div class="now-playing">
        <div class="now-playing-label">
          <div class="live-dot" id="liveDot"></div>
          <span>משודר עכשיו</span>
        </div>
        <div id="songTitle" class="song-live">LIVE</div>
        <div id="songArtist" class="song-artist"></div>
        <div id="songLinks" class="song-links"></div>
      </div>
      <div class="controls">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <div class="volume-wrap">
          <span class="volume-label">VOL</span>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
        </div>
      </div>
    </div>



    <div class="history">
      <div class="history-header" style="display:flex;justify-content:space-between;align-items:center;">
        <div class="select-all-wrap">
          <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" title="בחר הכל">
          <span>היסטוריית שירים</span>
        </div>
        <button onclick="savePlaylist()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;padding:0.3rem 0.6rem;cursor:pointer;text-transform:uppercase;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">+ Spotify</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-history">אין שירים עדיין</div>
      </div>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
  <audio id="radioAudio" crossorigin="anonymous"></audio>

  <script>
    const HLS_URL = 'https://kan88-proxy-production.up.railway.app/stream/playlist.m3u8?bitrate=192000&audioId=1&lang=pol&renditions';
    const PROXY = 'https://kan88-proxy-production.up.railway.app';
    const audio = document.getElementById('radioAudio');
    let isPlaying = false;
    let hls = null;
    let autoDetect = false;
    let autoInterval = null;
    const songHistory = [];
    let spotifyToken = null;
    let pendingPlaylist = false;

    // קבל token מ-Spotify redirect
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('spotify_token')) {
      spotifyToken = urlParams.get('spotify_token');
      window.history.replaceState({}, '', '/');
      // שחזר היסטוריה מ-sessionStorage
      const saved = sessionStorage.getItem('songHistory');
      if (saved) {
        const parsed = JSON.parse(saved);
        parsed.forEach(s => songHistory.push(s));
        sessionStorage.removeItem('songHistory');
        renderHistory();
        // חפש Spotify IDs לכל השירים
        (async () => {
          setStatus('מחפש שירים בספוטיפיי…', 'success');
          for (const song of songHistory) {
            if (!song.spotifyId) {
              try {
                const sRes = await fetch(`${PROXY}/spotify/search?title=${encodeURIComponent(song.title)}&artist=${encodeURIComponent(song.artist)}`);
                const sData = await sRes.json();
                if (sData.id) song.spotifyId = sData.id;
              } catch (e) {}
            }
          }
          renderHistory();
          setStatus('מחובר לספוטיפיי ✓', 'success');
          savePlaylist();
        })();
      }
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('statusBar');
      el.textContent = msg;
      el.className = 'status-bar' + (type ? ' ' + type : '');
    }

    function tryStream() {
      audio.volume = parseFloat(document.getElementById('volumeSlider').value);
      setStatus('מתחבר לשידור…');
      if (Hls.isSupported()) {
        hls = new Hls({ enableWorker: false });
        hls.loadSource(HLS_URL);
        hls.attachMedia(audio);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          audio.play().then(() => {
            setStatus('משודר בשידור חי', 'success');
            document.getElementById('liveDot').style.opacity = '1';
          }).catch(() => setStatus('לא ניתן להפעיל.', 'error'));
        });
        hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) setStatus('שגיאת חיבור לשידור.', 'error');
        });
      } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
        audio.src = HLS_URL;
        audio.play().then(() => {
          setStatus('משודר בשידור חי', 'success');
          document.getElementById('liveDot').style.opacity = '1';
        }).catch(() => setStatus('לא ניתן להפעיל.', 'error'));
      } else {
        setStatus('הדפדפן לא תומך בשידור זה.', 'error');
      }
    }

    function togglePlay() {
      if (isPlaying) {
        if (hls) { hls.destroy(); hls = null; }
        audio.pause(); audio.src = '';
        isPlaying = false;
        document.getElementById('liveDot').style.opacity = '0.3';
        setStatus('');
        // עצור סריקה
        if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
      } else {
        isPlaying = true;
        tryStream();
        // התחל סריקה מיידית
        detect();
        autoInterval = setInterval(detect, 10000);
      }
      updatePlayBtn();
    }

    function updatePlayBtn() {
      document.getElementById('playIcon').innerHTML = isPlaying
        ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
        : '<polygon points="5,3 19,12 5,21"/>';
    }

    function setVolume(v) { audio.volume = parseFloat(v); }

    let lastSongTitle = null;

    async function detect() {
      try {
        const res = await fetch('https://www.kan.org.il/api/arc-cloud/get-live-track-data?channelId=4');
        const data = await res.json();
        if (data.title && data.title !== lastSongTitle) {
          lastSongTitle = data.title;
          const title = data.title;
          const artist = data.artists?.join(', ') || '';
          const searchQuery = encodeURIComponent(`${title} ${artist}`);
          const spotifyUrl = `https://open.spotify.com/search/${searchQuery}`;
          const youtubeUrl = `https://www.youtube.com/results?search_query=${searchQuery}`;
          const appleMusicUrl = `https://music.apple.com/search?term=${searchQuery}`;

          // Search for Spotify ID (no user token needed)
          let spotifyId = null;
          try {
            const sRes = await fetch(`${PROXY}/spotify/search?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`);
            const sData = await sRes.json();
            if (sData.id) spotifyId = sData.id;
          } catch (e) {}

          showSong(title, artist, spotifyId ? `https://open.spotify.com/track/${spotifyId}` : spotifyUrl, youtubeUrl, appleMusicUrl, spotifyId);
        } else if (!data.title) {
          document.getElementById('songTitle').textContent = 'LIVE';
          document.getElementById('songTitle').className = 'song-live';
          document.getElementById('songArtist').textContent = '';
          document.getElementById('songLinks').innerHTML = '';
          lastSongTitle = null;
        }
      } catch (e) {
        setStatus('שגיאה בזיהוי.', 'error');
      }
    }



    function showSong(title, artist, spotifyUrl, youtubeUrl, appleMusicUrl, spotifyId = null) {
      const titleEl = document.getElementById('songTitle');
      titleEl.textContent = title;
      titleEl.className = 'song-title';
      document.getElementById('songArtist').textContent = artist;
      const linksEl = document.getElementById('songLinks');
      if (spotifyUrl) {
        linksEl.innerHTML = `<a href="${spotifyUrl}" target="_blank">Spotify</a> · <a href="${youtubeUrl}" target="_blank">YouTube</a> · <a href="${appleMusicUrl}" target="_blank">Apple Music</a>`;
      } else {
        linksEl.innerHTML = '';
      }
      setStatus('זוהה בהצלחה ✓', 'success');
      const now = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
      const last = songHistory[0];
      if (!last || last.title !== title) {
        songHistory.unshift({ title, artist, spotifyId, time: now });
        renderHistory();
      }
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (!songHistory.length) { list.innerHTML = '<div class="empty-history">אין שירים עדיין</div>'; return; }
      list.innerHTML = songHistory.map((item, i) => `
        <div class="history-item">
          <input type="checkbox" class="song-checkbox" data-index="${i}" ${item.selected ? 'checked' : ''} onchange="songHistory[${i}].selected = this.checked; updateSelectAll()">
          <div style="flex:1;margin:0 0.75rem"><div class="history-song">${item.title}</div><div class="history-artist">${item.artist}</div></div>
          <div class="history-time">${item.time}</div>
        </div>`).join('');
    }

    function toggleSelectAll(checked) {
      songHistory.forEach(s => s.selected = checked);
      renderHistory();
      document.getElementById('selectAll').checked = checked;
    }

    function updateSelectAll() {
      const all = songHistory.every(s => s.selected);
      document.getElementById('selectAll').checked = all;
    }

    async function savePlaylist() {
      if (!spotifyToken) {
        sessionStorage.setItem('songHistory', JSON.stringify(songHistory));
        window.location.href = `${PROXY}/spotify/login`;
        return;
      }
      const selected = songHistory.filter(s => s.selected && s.spotifyId);
      if (!selected.length) {
        setStatus('בחר לפחות שיר אחד עם מזהה ספוטיפיי.', 'error');
        return;
      }
      const trackIds = selected.map(s => s.spotifyId);
      setStatus('יוצר פלייליסט…');
      try {
        const res = await fetch(`${PROXY}/spotify/create-playlist`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: spotifyToken, trackIds, name: `כאן 88 – ${new Date().toLocaleDateString('he-IL')}` })
        });
        const data = await res.json();
        if (data.playlistUrl) {
          setStatus('פלייליסט נוצר! ✓', 'success');
          window.open(data.playlistUrl, '_blank');
        } else {
          setStatus('שגיאה ביצירת פלייליסט.', 'error');
        }
      } catch (e) {
        setStatus('שגיאה: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
